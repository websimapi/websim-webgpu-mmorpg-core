<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU MMORPG Core</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }
        #console-out {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border: 1px solid #00ff00;
            flex-grow: 1;
            overflow-y: auto;
            pointer-events: auto;
            text-shadow: 0 0 5px #00ff00;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .input-line {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff00;
            padding: 5px;
            pointer-events: auto;
        }
        .input-line span {
            margin-right: 10px;
            font-weight: bold;
            color: #00ff00;
        }
        #cmd-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
        }
        h1 {
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>MMORPG CORE: SPAWN CHUNK</h1>
    <p>Check browser console (F12) for engine interaction.</p>

    <div id="ui-layer">
        <div id="console-out">Initializing System...<br></div>
        <div class="input-line">
            <span>></span>
            <input type="text" id="cmd-input" placeholder="Enter command (e.g. move 1 0 0)" autocomplete="off">
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { GameEngine } from './src/Engine.js';

        // Initialize Game
        async function init() {
            try {
                window.game = new GameEngine();
                await window.game.start();
                
                logSystem("Game Ready. Type commands below or use DevTools console.");
                logSystem("Try: 'move 10 0 0' or 'help'");
                
                // Focus input
                document.getElementById('cmd-input').focus();
            } catch (e) {
                console.error(e);
                logSystem(`CRITICAL ERROR: ${e.message}`, 'red');
            }
        }

        function logSystem(msg, color = '#00ff00') {
            const el = document.getElementById('console-out');
            const div = document.createElement('div');
            div.style.color = color;
            div.textContent = `> ${msg}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        // Command Parser
        const input = document.getElementById('cmd-input');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmdText = input.value.trim();
                input.value = '';
                if (cmdText) processCommand(cmdText);
            }
        });

        function processCommand(raw) {
            logSystem(raw, '#ffff00');
            
            if (!window.game || !window.game.isRunning) {
                logSystem("Engine not running.", 'red');
                return;
            }

            const parts = raw.split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1).map(Number); // Convert args to numbers

            try {
                let res;
                switch (cmd) {
                    case 'move':
                        if (args.length < 3 || args.some(isNaN)) throw new Error("Usage: move x y z");
                        res = window.game.move(args[0], args[1], args[2]);
                        break;
                    case 'tp':
                        if (args.length < 3 || args.some(isNaN)) throw new Error("Usage: tp x y z");
                        res = window.game.tp(args[0], args[1], args[2]);
                        break;
                    case 'chat':
                        const msg = raw.substring(5).trim();
                        res = window.game.chat(msg);
                        break;
                    case 'status':
                        window.game.status();
                        res = "Status printed to DevTools Console.";
                        break;
                    case 'help':
                        res = "Commands: move <x> <y> <z>, tp <x> <y> <z>, chat <msg>, status";
                        break;
                    default:
                        res = "Unknown command. Type 'help' for list.";
                }
                logSystem(res, '#ccc');
            } catch (err) {
                logSystem(`Error: ${err.message}`, 'red');
            }
        }

        init();
    </script>

</body>
</html>
